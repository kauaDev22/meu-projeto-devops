apiVersion: apps/v1
kind: Deployment
metadata:
  name: minha-api-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: minha-api
  template:
    metadata:
      labels:
        app: minha-api
    spec:
      containers:
      - name: minha-api-container
        image: kaua010/my-api-devops:v1
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: minha-api-service
spec:
  type: NodePort
  selector:
    app: minha-api
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30000
