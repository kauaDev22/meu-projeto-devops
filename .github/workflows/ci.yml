name: CI DevOps - Build e Push

# Quando esse robô deve trabalhar?
on:
  push:
    branches:
      - main

jobs:
  construir-e-enviar:
    runs-on: ubuntu-latest # O robô vai usar uma máquina Ubuntu do próprio GitHub

    steps:
      # 1. Pega o nosso código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # 2. Faz login no Docker Hub usando os segredos que você criou
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Constrói a imagem e envia para o Docker Hub
      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-api-devops:latest
